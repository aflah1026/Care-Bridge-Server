version: "3"

services:
  backend:
    build: .
    ports:
      - "8080:5000"
    environment:
      NODE_ENV: production
      DB_USER: postgres
      DB_PASSWORD: password
      DB_HOST: host.docker.internal
      DB_PORT: 5432
      DB_NAME: carebridge
      JWT_SECRET: key
    networks:
      - carebridge-network

networks:
  carebridge-network:
    driver: bridge